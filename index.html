<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaden Xu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;width:100%;">
      <a href="index.html" class="nav-logo">Jaden Xu</a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="blog.html">文章</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <!-- 个人介绍 -->
    <section class="hero">
      <img class="hero-avatar" src="images/avatar.svg" alt="头像">
      <h1>你好，我是 Jaden Xu</h1>
      <p class="tagline">在读硕士 · 网球爱好者</p>
      <div class="divider"></div>
      <p class="bio">
        我目前正在攻读硕士学位。学习之外，网球是我最大的爱好——喜欢在球场上奔跑、挥拍的感觉。这里记录我的思考和生活中的点滴。
      </p>
      <div class="social-links">
        <a href="https://github.com/xupu2846" target="_blank">GitHub</a>
        <a href="mailto:xupu2846@gmail.com">Gmail</a>
        <a href="mailto:xupu2846@163.com">Email</a>
      </div>
    </section>

    <!-- 最新文章 -->
    <section class="recent-posts">
      <div class="section-header">
        <h2 class="section-title">最新文章</h2>
        <a href="blog.html" class="view-all">查看全部 →</a>
      </div>
      <div id="recent-posts"></div>
    </section>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="index.html">首页</a>
        <a href="blog.html">文章</a>
        <a href="https://github.com/xupu2846" target="_blank">GitHub</a>
      </div>
      <p>© 2026 Jaden Xu</p>
    </div>
  </footer>

  <script src="js/blog.js"></script>
  <script>
    const recentPosts = posts.slice(0, 5);
    const container = document.getElementById('recent-posts');
    if (recentPosts.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>还没有文章</p></div>';
    } else {
      recentPosts.forEach(post => {
        const tagsHtml = post.tags
          ? post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')
          : '';
        container.innerHTML += `
          <a class="post-card" href="${post.url}">
            <h3>${post.title}</h3>
            <div class="post-meta">
              <span>${post.date}</span>
            </div>
            ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
            ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
          </a>
        `;
      });
    }
  </script>
</body>
</html>

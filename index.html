<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人网站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 导航栏 -->
    <nav class="nav">
      <a href="index.html" class="nav-logo">你的名字</a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="blog.html">文章</a></li>
      </ul>
    </nav>

    <!-- 个人介绍 -->
    <section class="hero">
      <div class="hero-avatar">🙂</div>
      <h1>你好，我是____</h1>
      <p class="tagline">一句话介绍自己，比如：热爱生活、喜欢记录的程序员 / 设计师 / 自由职业者</p>
      <p class="bio">
        在这里写一段简短的自我介绍。比如你的背景、兴趣爱好、目前在做什么，或者你想让访客了解的任何事情。这段文字可以是一两句话，也可以是一小段话，完全由你来定。
      </p>
      <div class="social-links">
        <a href="#" target="_blank">GitHub</a>
        <a href="#" target="_blank">Twitter</a>
        <a href="mailto:your@email.com">Email</a>
      </div>
    </section>

    <!-- 最新文章 -->
    <section class="recent-posts">
      <h2 class="section-title">最新文章</h2>
      <div id="recent-posts"></div>
      <a href="blog.html" class="view-all">查看全部文章 →</a>
    </section>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 你的名字</p>
    </div>
  </footer>

  <script src="js/blog.js"></script>
  <script>
    // 在首页展示最近 3 篇文章
    const recentPosts = posts.slice(0, 3);
    const container = document.getElementById('recent-posts');
    recentPosts.forEach(post => {
      container.innerHTML += `
        <div class="post-card">
          <a href="${post.url}">
            <h3>${post.title}</h3>
            <span class="post-meta">${post.date}</span>
            ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
          </a>
        </div>
      `;
    });
  </script>
</body>
</html>

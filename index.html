<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人网站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 导航栏 -->
    <nav class="nav">
      <a href="index.html" class="nav-logo">Jaden Xu</a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="blog.html">文章</a></li>
      </ul>
    </nav>

    <!-- 个人介绍 -->
    <section class="hero">
      <img class="hero-avatar" src="images/avatar.svg" alt="头像">
      <h1>你好，我是 Jaden Xu</h1>
      <p class="tagline">在读硕士 · 网球爱好者</p>
      <p class="bio">
        我目前正在攻读硕士学位。学习之外，网球是我最大的爱好——喜欢在球场上奔跑、挥拍的感觉。这个网站用来记录我的思考和生活中的点滴。
      </p>
      <div class="social-links">
        <a href="https://github.com/xupu2846" target="_blank">GitHub</a>
        <a href="mailto:xupu2846@gmail.com">Gmail</a>
        <a href="mailto:xupu2846@163.com">Email</a>
      </div>
    </section>

    <!-- 最新文章 -->
    <section class="recent-posts">
      <h2 class="section-title">最新文章</h2>
      <div id="recent-posts"></div>
      <a href="blog.html" class="view-all">查看全部文章 →</a>
    </section>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Jaden Xu</p>
    </div>
  </footer>

  <script src="js/blog.js"></script>
  <script>
    // 在首页展示最近 3 篇文章
    const recentPosts = posts.slice(0, 3);
    const container = document.getElementById('recent-posts');
    recentPosts.forEach(post => {
      container.innerHTML += `
        <div class="post-card">
          <a href="${post.url}">
            <h3>${post.title}</h3>
            <span class="post-meta">${post.date}</span>
            ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
          </a>
        </div>
      `;
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaden Xu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
    <span class="icon-light">☀️</span>
    <span class="icon-dark">🌙</span>
  </button>
  <div class="layout">
    <!-- 左侧栏 -->
    <aside class="sidebar">
      <img class="sidebar-avatar" src="images/avatar.svg" alt="头像">
      <div class="sidebar-name">Jaden Xu</div>
      <div class="sidebar-tagline">在读硕士 · 网球爱好者</div>
      <div class="sidebar-divider"></div>
      <p class="sidebar-bio">
        我目前正在攻读硕士学位。学习之外，网球是我最大的爱好。这里记录我的思考和生活中的点滴。
      </p>
      <ul class="sidebar-nav">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="blog.html">文章</a></li>
      </ul>
      <div class="sidebar-social">
        <a href="https://github.com/xupu2846" target="_blank">GitHub</a>
        <a href="mailto:xupu2846@gmail.com">Gmail</a>
        <a href="mailto:xupu2846@163.com">163</a>
      </div>
    </aside>

    <!-- 右侧主内容 -->
    <main class="main">
      <div class="section-header">
        <h2 class="section-title">最新文章</h2>
        <a href="blog.html" class="view-all">全部 →</a>
      </div>
      <div id="recent-posts"></div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 Jaden Xu</p>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/blog.js"></script>
  <script>
    const recentPosts = posts.slice(0, 5);
    const container = document.getElementById('recent-posts');
    if (recentPosts.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>还没有文章</p></div>';
    } else {
      recentPosts.forEach(post => {
        const tagsHtml = post.tags
          ? post.tags.map(t => `<span class="post-tag ${getTagClass(t)}">${t}</span>`).join('')
          : '';
        container.innerHTML += `
          <a class="post-card" href="${post.url}">
            <h3>${post.title}</h3>
            <div class="post-meta">${post.date}</div>
            ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}
            ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
          </a>
        `;
      });
    }
  </script>
</body>
</html>
